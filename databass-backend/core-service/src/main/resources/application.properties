server.port=8081
spring.application.name=core-service

spring.datasource.url=jdbc:postgresql://postgres:5432/databass
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

minio.url=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=databass-songs

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/

python.api.token=${HF_TOKEN}
python.api.trigger.url=https://septimium-music-generation-api.hf.space/gradio_api/call/generate
python.api.result.url=https://septimium-music-generation-api.hf.space/gradio_api/call/generate

jwt.key=${JWT_SECRET_KEY}
gemini.api.key=${GEMINI_API_KEY}